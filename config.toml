baseURL = "http://example.org/"
languageCode = "ja-jp"
title = "Look back on myself"
theme = "hugo-geekblog"

# Required to get well formatted code blocks
# Following options are referenced by
# https://geekdocs.de/usage/configuration/#site-configuration
pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true
enableGitInfo = true

[markup]
  [markup.goldmark.renderer]
    # Needed for mermaid shortcode
    unsafe = true
	[markup.tableOfContents]
		startLevel = 1
		endLevel = 9
[outputFormats.outputs]
  home = ["HTML", "ATOM"]
  page = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML", "ATOM"]
